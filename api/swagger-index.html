<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crescent API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
      (function () {
        const query = new URLSearchParams(window.location.search);
        const url = query.get('url') || '/api-json';
        // Keep in sync with src/swagger/openapi-document.builder.ts → SWAGGER_TAG_ORDER
        const TAG_ORDER = [
          'Auth', 'Users', 'Sales',
          'Inventory setup', 'Inventory items', 'Inventory purchase requests', 'Inventory purchase orders',
          'Inventory grn', 'Inventory movements', 'Inventory reports', 'Inventory utility', 'Inventory dashboard',
          'Permissions', 'Role permissions', 'Roles', 'User roles',
          'Employees', 'Devices', 'SIMs', 'Device combos', 'Accessories', 'Offices', 'Zones',
          'Zone employees', 'Products', 'Packages', 'Client categories', 'Banks', 'Bank accounts',
          'Cities', 'Vendors',
        ];
        window.ui = SwaggerUIBundle({
          url: url,
          dom_id: '#swagger-ui',
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: 'StandaloneLayout',
          persistAuthorization: true,
          tagsSorter: (a, b) => {
            const nameA = typeof a === 'string' ? a : (a && a.name) || '';
            const nameB = typeof b === 'string' ? b : (b && b.name) || '';
            const ia = TAG_ORDER.indexOf(nameA);
            const ib = TAG_ORDER.indexOf(nameB);
            if (ia === -1 && ib === -1) return nameA.localeCompare(nameB);
            if (ia === -1) return 1;
            if (ib === -1) return -1;
            return ia - ib;
          },
          operationsSorter: 'alpha',
        });
      })();
    </script>
  </body>
</html>
